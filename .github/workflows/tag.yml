name: tag

# Version shared-cmake as a GitHub Action. On each push to main: create the immutable
# vX.Y.Z tag (once, from the VERSION file) and fast-forward the moving major tag vX.
# Consumers pin @v1 (moving -> latest v1.x) or @vX.Y.Z (exact). Renovate's native
# github-actions manager handles the pin -- no custom manager, no marker comment.
# Bump VERSION (and the major, deliberately, on a breaking change) to cut a release.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag version + move major
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ver="$(cat VERSION)"
          major="v${ver%%.*}"
          if git rev-parse -q --verify "refs/tags/v$ver" >/dev/null; then
            echo "v$ver already exists -- leaving it (bump VERSION to cut a new release)"
          else
            git tag -a "v$ver" -m "v$ver"
            git push origin "v$ver"
            echo "created v$ver"
          fi
          # move the major tag consumers pin (@vN) to the latest N.x commit
          git tag -f -a "$major" -m "$major -> v$ver"
          git push -f origin "$major"
          echo "moved $major -> $(git rev-parse --short HEAD)"
